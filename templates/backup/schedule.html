{% extends "base.html" %}
{% block title %}Schedule Backups — NAS Server{% endblock %}

{% block content %}
<div class="page-header">
    <span class="eyebrow">Admin</span>
    <h1>Schedule Automatic Backups</h1>
    <p>Set a recurring interval for automatic backups. The schedule is active while the server is running.</p>
</div>

<div class="form-panel" style="max-width: 480px;">
    <form method="POST">
        <div class="field-row" style="flex-direction: column; align-items: stretch; gap: 1rem;">
            <div>
                <label for="interval">Backup interval</label>
                <select id="interval" name="interval">
                    <option value="1" {% if current_job and current_job.trigger.interval.total_seconds()==3600 %}
                        selected{% endif %}>Every 1 hour</option>
                    <option value="6" {% if current_job and current_job.trigger.interval.total_seconds()==21600 %}
                        selected{% endif %}>Every 6 hours</option>
                    <option value="12" {% if current_job and current_job.trigger.interval.total_seconds()==43200 %}
                        selected{% endif %}>Every 12 hours</option>
                    <option value="24" {% if not current_job or current_job.trigger.interval.total_seconds()==86400 %}
                        selected{% endif %}>Every 24 hours (daily)</option>
                </select>
            </div>
            <div style="display: flex; gap: 0.75rem;">
                <button type="submit" class="btn btn-primary">Save schedule</button>
                <a href="{{ url_for('backup.index') }}" class="btn btn-outline">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
