{% extends "base.html" %}
{% block title %}Edit User — NAS Server{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit user</h1>
    <p>Updating <strong>{{ user['username'] }}</strong></p>
</div>
<div class="form-panel">
    <form method="POST">
        <label for="role">Role</label>
        <select id="role" name="role">
            <option value="user" {% if user['role']=='user' %}selected{% endif %}>User</option>
            <option value="admin" {% if user['role']=='admin' %}selected{% endif %}>Admin</option>
        </select>

        <label>Permissions</label>
        <div class="checkbox-list">
            <label><input type="checkbox" name="permissions" value="read" {% if 'read' in user['permissions']
                    %}checked{% endif %}> Read</label>
            <label><input type="checkbox" name="permissions" value="write" {% if 'write' in user['permissions']
                    %}checked{% endif %}> Write</label>
            <label><input type="checkbox" name="permissions" value="edit" {% if 'edit' in user['permissions']
                    %}checked{% endif %}> Edit</label>
        </div>

        <label for="storage_quota_gb">Storage quota (GB)</label>
        <input type="number" id="storage_quota_gb" name="storage_quota_gb"
            min="0" step="0.01"
            value="{{ '%.3f' % (user['storage_quota_bytes'] / (1024**3)) if user['storage_quota_bytes'] else 0 }}">
        <small class="mono-muted">0 = no individual limit. Combined user quotas cannot exceed the global NAS quota.</small>

        <button type="submit">Save changes</button>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('users.list_users') }}">Back to user list</a>
    </div>
</div>
{% endblock %}
