{% extends "base.html" %}
{% block title %}Edit User — NAS Server{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit user</h1>
    <p>Updating <strong>{{ user['username'] }}</strong></p>
</div>
<div class="form-panel">
    <form method="POST">
        <label for="role">Role</label>
        <select id="role" name="role">
            <option value="user" {% if user['role'] == 'user' %}selected{% endif %}>User</option>
            <option value="admin" {% if user['role'] == 'admin' %}selected{% endif %}>Admin</option>
        </select>

        <label>Permissions</label>
        <div class="checkbox-list">
            <label><input type="checkbox" name="permissions" value="read" {% if 'read' in user['permissions'] %}checked{% endif %}> Read</label>
            <label><input type="checkbox" name="permissions" value="write" {% if 'write' in user['permissions'] %}checked{% endif %}> Write</label>
            <label><input type="checkbox" name="permissions" value="edit" {% if 'edit' in user['permissions'] %}checked{% endif %}> Edit</label>
            <label><input type="checkbox" name="permissions" value="admin" {% if 'admin' in user['permissions'] %}checked{% endif %}> Admin</label>
        </div>

        <button type="submit">Save changes</button>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('users.list_users') }}">Back to user list</a>
    </div>
</div>
{% endblock %}
