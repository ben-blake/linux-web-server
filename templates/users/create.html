{% extends "base.html" %}
{% block title %}Create User — NAS Server{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create user</h1>
    <p>Add a new account and choose what they can do on the NAS.</p>
</div>
<div class="form-panel">
    <form method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password">

        <label for="role">Role</label>
        <select id="role" name="role">
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <label>Permissions</label>
        <div class="checkbox-list">
            <label><input type="checkbox" name="permissions" value="read" checked> Read</label>
            <label><input type="checkbox" name="permissions" value="write"> Write</label>
            <label><input type="checkbox" name="permissions" value="edit"> Edit</label>
        </div>

        <button type="submit">Create user</button>
    </form>
    <div class="form-footer">
        <a href="{{ url_for('users.list_users') }}">Back to user list</a>
    </div>
</div>
{% endblock %}
