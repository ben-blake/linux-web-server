{% extends "base.html" %}
{% block title %}Profile — NAS Server{% endblock %}

{% block content %}
<h1>My Profile</h1>
<p>Username: <strong>{{ session.get('username') }}</strong></p>
<p>Role: <strong>{{ session.get('role') }}</strong></p>
<p>Permissions: <strong>{{ session.get('permissions') }}</strong></p>

<h2 style="margin-top: 30px;">Change Password</h2>
<form method="POST" style="max-width: 500px;">
    <label for="current_password">Current Password</label>
    <input type="password" id="current_password" name="current_password" required>

    <label for="new_password">New Password</label>
    <input type="password" id="new_password" name="new_password" required>

    <button type="submit">Update Password</button>
</form>
{% endblock %}
