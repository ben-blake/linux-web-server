{% extends "base.html" %}

{% block public_content %}
<div class="login-container">
    <div class="login-brand-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="8" rx="2"/>
            <rect x="3" y="14" width="18" height="8" rx="2"/>
            <path d="M7 7h.01M7 17h.01"/>
        </svg>
    </div>
    <h1>NAS Server</h1>
    <p class="login-sub">Sign in to manage storage and users</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash {{ category }} flash--dismissible" role="alert">
                {{ message }}
                <button type="button" class="flash-dismiss" aria-label="Dismiss">&times;</button>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.login') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Login</button>
    </form>
</div>
{% endblock %}
